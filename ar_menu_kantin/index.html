<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Menu Kantin</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="ui">

    <button id="btnInfo">
        Info Menu
    </button>

    <div id="infoBox">

        <h2>Teh Panas</h2>

        <p>
            Harga : Rp10.000
        </p>

        <p>
            Teh panas dengan gula.
        </p>

    </div>

</div>

<a-scene
    xr-mode-ui="enabled: true"
    renderer="colorManagement:true">

    <a-assets>

        <a-asset-item
            id="foodModel"
            src="assets/CupTea.glb">
        </a-asset-item>

    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <a-entity
        id="menu3d"
        gltf-model="#foodModel"
        position="0 0 -2"
        rotation="0 180 0"
        scale="0.5 0.5 0.5">
    </a-entity>

</a-scene>

<script src="app.js"></script>

</body>
</html>
